name = "bayflix-hifi-api"
main = "src/index.ts"
compatibility_date = "2026-03-25"
minify = true
workers_dev = true

# Custom domain. Cloudflare auto-manages DNS for api.bayflix.ms and routes
# traffic to this Worker. Requires the token to have Workers Routes +
# DNS Edit + Workers Scripts permissions on the bayflix.ms zone.
[[routes]]
pattern = "api.bayflix.ms"
custom_domain = true

